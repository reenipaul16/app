name: Helm-trigger

on:
  push:
    branches: [main]
    paths:
      - '**/**/values.yaml'

jobs:
  build:
    name: Trigger helm deploy
    runs-on: ubuntu-latest

    steps: 
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get changed values files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/**/values.yaml

      - name: Print changed files
        run: |
          echo "Changed files:"
          echo "helm_dir=${{ steps.changed-files.outputs.all_changed_files }}" >> $GITHUB_OUTPUT 

      - name: Repository Dispatch
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.CI_PAT }}
          repository: reenipaul16/cicd-orchestration
          event-type: helm-deploy
          client-payload: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}", "repo_url": "${{ github.server_url }}/${{ github.repository }}", "helm_dir": "${{ steps.changed-files.outputs.all_changed_files }}"}'